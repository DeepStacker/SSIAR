services:
  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      tags:
        - "ssiar-app:latest"
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    cpus: 1.5
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v3/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://app:8000
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
